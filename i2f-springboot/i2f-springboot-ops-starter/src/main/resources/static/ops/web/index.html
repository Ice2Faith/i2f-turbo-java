<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 1小时缓存过期 -->
    <meta http-equiv="Cache-Control" content="max-age=3600, public">
    <title>Ops - Web</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="../lib/vue/vue-2.js"></script>
    <script src="../lib/moment/moment-2.24.0.js"></script>
    <script src="../lib/element-ui/element-ui-2.15.10.js"></script>
    <link rel="stylesheet" href="../lib/element-ui/element-ui-2.15.10.css"/>
    <link rel="stylesheet" href="../lib/element-ui/element-ui-2.15.10-icon.css"/>
    <link href="../lib/element-ui/fonts/element-icons.ttf"/>
    <link href="../lib/element-ui/fonts/element-icons.woff"/>
    <script src="../lib/axios/axios-1.1.3.min.js"></script>
    <script src="../lib/axios/qs.js"></script>
    <script src="../lib/sm-crypto-0.3.2.1-RELEASE/sm4.js"></script>
    <script src="../lib/sm-crypto-0.3.2.1-RELEASE/sm3.js"></script>
    <script src="../lib/sm-crypto-0.3.2.1-RELEASE/sm2.js"></script>
    <script src="../lib/base64/Base64.js"></script>
    <script src="../common/OpsSecureKeyPair.js"></script>
    <script src="../common/OpsSecureCertPair.js"></script>
    <script src="../common/OpsSecureDto.js"></script>
    <script src="../common/OpsSecureHelper.js"></script>
    <script src="../common/OpsSecureTransfer.js"></script>
    <script src="../lib/vue-contextmenujs-1.4.11/contextmenu.umd.js"></script>
    <!-- 从这里查找 CDN 资源： https://cdnjs.com/libraries/codemirror -->
    <script src="../lib/codemirror-6.65.7/codemirror.min.js"></script>
    <link rel="stylesheet" href="../lib/codemirror-6.65.7/codemirror.min.css"/>
    <link rel="stylesheet" href="../lib/codemirror-6.65.7/addon/hint/show-hint.min.css"/>
    <script src="../lib/codemirror-6.65.7/addon/hint/show-hint.min.js"></script>
    <link rel="stylesheet" href="../lib/codemirror-6.65.7/theme/idea.min.css"/>

    <script src="../lib/codemirror-6.65.7/addon/search/search.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/search/searchcursor.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/search/jump-to-line.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/search/match-highlighter.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/groovy/groovy.min.js"></script>

    <link rel="stylesheet" href="../lib/vue-virtual-scroller/vue-virtual-scroller.css"/>
    <script src="../lib/vue-virtual-scroller/vue-virtual-scroller.min.js"></script>
    <script src="../lib/crypto-js-4.2.0/crypto-js.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/yaml/yaml.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/lint/yaml/yaml-lint.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/javascript/javascript.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/hint/javascript/javascript-hint.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/lint/javascript/javascript-lint.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/sql/sql.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/hint/sql/sql-hint.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/shell/shell.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/xml/xml.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/fold/xml/xml-fold.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/hint/xml/xml-hint.min.js"></script>

    <script src="../lib/codemirror-6.65.7/addon/lint/html/html-lint.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/hint/html/html-hint.min.js"></script>
    <script src="../lib/codemirror-6.65.7/mode/htmlmixed/htmlmixed.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/markdown/markdown.min.js"></script>
    <script src="../lib/codemirror-6.65.7/addon/fold/markdown/markdown-fold.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/groovy/groovy.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/nginx/nginx.min.js"></script>

    <script src="../lib/codemirror-6.65.7/mode/python/python.min.js"></script>

    <script src="../lib/sql-formatter/15.6.9/sql-formatter.min.js"></script>

    <link rel="stylesheet" href="../lib/jsoneditor/10.4.1/jsoneditor.min.css"/>
    <script src="../lib/jsoneditor/10.4.1/jsoneditor.min.js"></script>
</head>
<body>
<div id="app">
    <el-divider>Web操作</el-divider>
    <el-card shadow="never">
        <span>文本编辑器</span>
        <div :class="'expand-main-editor'+(expandMainEditor?' expand-main-editor__expand':'')"
             @contextmenu.prevent="onEditorContextmenu(editor,['sql','json-editor'])">
            <textarea ref="refEditor"></textarea>
        </div>
        <span class="el-icon-full-screen expand-main-editor__badge" @click="expandMainEditor=!expandMainEditor"></span>
    </el-card>

    <el-dialog
            :title="dialog.textViewer.title"
            :visible.sync="dialog.textViewer.show"
            width="80%">
        <el-card shadow="never">
            <el-form inline label-position="left" label-width="100px">
                <el-form-item label="语言类型">
                    <el-select clearable filterable v-model="dialog.textViewer.lang" placeholder="语言类型"
                               @change="onTextViewerLangChange">
                        <el-option
                                v-for="item in metas.langList"
                                :key="item.value"
                                :label="item.label"
                                :value="item.value">
                        </el-option>
                    </el-select>
                </el-form-item>
            </el-form>
            <div @contextmenu.prevent="onEditorContextmenu(langEditors?.textViewerEditor,['sql','json-editor'])">
                <textarea ref="refTextViewerEditor"></textarea>
            </div>

        </el-card>
    </el-dialog>

    <el-dialog
            :title="dialog.jsonEditor.title"
            :visible.sync="dialog.jsonEditor.show"
            top="5vh"
            width="90%">
        <div ref="refJsonEditor" style="width: 100%; height: 70vh;"></div>
        <el-row type="flex" justify="end" style="margin-top: 5px;">
            <el-button size="mini" @click="dialog.jsonEditor.show=false;">取消</el-button>
            <el-button type="primary" size="mini" @click="onSaveJsonEditorContent">保存</el-button>
        </el-row>
    </el-dialog>
</div>
</body>
<script>
    Vue.use(VueVirtualScroller.default);
    window.app = new Vue({
        components: {},
        data() {
            return this.getDefaultData()
        },
        created() {
            this.initStoreData();
            this.initCompletionsRefreshInterval();
            this.initBroadcast();
        },
        mounted() {
            this.initEditor();
            this.initTextViewerEditor();
        },
        watch: {},
        computed: {},
        methods: {
            getDefaultData() {
                return {
                    expandMainEditor: false,
                    editor: null,
                    opsBroadcastChannel: null,
                    langEditors: {
                        textViewerEditor: null,
                        jsonEditor: null,
                    },
                    completions: [],
                    storage: {},
                    metas: {
                        cert: '',
                        langList: [
                            {label: 'Text', value: 'text'},
                            {label: 'Yaml', value: 'yaml'},
                            {label: 'Json', value: 'javascript'},
                            {label: 'SQL', value: 'sql'},
                            {label: 'Shell', value: 'shell'},
                            {label: 'Xml', value: 'xml'},
                            {label: 'Html', value: 'htmlmixed'},
                            {label: 'Markdown', value: 'markdown'},
                            {label: 'Groovy', value: 'groovy'},
                            {label: 'Nginx', value: 'nginx'},
                            {label: 'Python', value: 'python'},
                        ]
                    },
                    drawer: {},
                    dialog: {
                        textViewer: {
                            show: false,
                            title: '文本浏览',
                            text: '',
                            lang: 'text'
                        },
                        jsonEditor: {
                            show: false,
                            title: 'JSON编辑器',
                            text: '',
                            // function(text)
                            saveCallback: null,
                        },
                    },
                    form: {}
                }
            },
            initBroadcast() {
                this.opsBroadcastChannel = new BroadcastChannel('ops_station_broadcast');

                setInterval(() => {
                    this.opsBroadcastChannel.postMessage({
                        type: 'cert',
                        data: this.metas.cert
                    });
                }, 3000)


                this.opsBroadcastChannel.onmessage = (event) => {
                    let data = event.data;
                    if (data.type == 'cert') {
                        if (!this.metas.cert || this.metas.cert == '') {
                            this.metas.cert = data.data;
                        }
                    }
                };

            },
            loadData() {
                let content = localStorage.getItem('ops:web:data');
                if (!content) {
                    return
                }
                content = content.trim();
                if (content.length == 0) {
                    return;
                }
                try {
                    let obj = JSON.parse(content);
                    Object.keys(obj).forEach(k => {
                        this.$data[k] = obj[k];
                    });
                } catch (e) {

                }
            },
            storeData() {
                try {
                    let data = {...this.$data};
                    data.editor = null;
                    data.opsBroadcastChannel = null;
                    data.langEditors = {};
                    Object.keys(this.$data.langEditors).forEach(k => {
                        data.langEditors[k] = null;
                    })
                    let json = JSON.stringify(data);
                    let obj = JSON.parse(json);
                    obj.metas.cert = '';
                    let content = JSON.stringify(obj);
                    localStorage.setItem('ops:web:data', content);
                } catch (e) {
                    // console.log(e)
                }
            },
            initCompletionsRefreshInterval() {
                let _this = this;

                function refresh() {
                    setTimeout(() => {
                        _this.collectCompletionItems()
                        refresh();
                    }, 3000);
                }

                refresh();
            },
            collectCompletionItems() {
                //console.log('begin collect completions ...')
                let items = [];
                let keywords = []
                if (keywords) {
                    items.push(...keywords);
                }

                if (this.metas.beans && this.metas.beans.length > 0) {
                    this.metas.beans.forEach(item => {
                        items.push(item.key);
                    })
                }

                let completions = [];
                items.forEach(item => {
                    if (!item) {
                        return;
                    }
                    item = item.trim();
                    if (item == '') {
                        return;
                    }
                    if (!completions.includes(item)) {
                        completions.push(item);
                    }
                })
                this.completions = items;
                //console.log('end collect completions .')
            },
            editorCompletionItemCollector(prefix) {
                if (!prefix) {
                    prefix = '';
                }
                prefix = prefix.toLowerCase();
                let ret = [];
                let count = 50;
                for (let i = 0; i < this.completions.length; i++) {
                    let e = this.completions[i];
                    if (e && e.toLowerCase().indexOf(prefix) >= 0) {
                        ret.push(e);
                        count--;
                        if (count <= 0) {
                            break;
                        }
                    }
                }
                return ret;
            },
            onEditorContextmenu(editor, categoryList) {
                let _this = this
                let convertText = function (convertor) {
                    try {
                        let text = editor.getSelection();
                        if (!text || text == '') {
                            text = editor.getValue()
                            text = convertor(text);
                            editor.setValue(text)
                        } else {
                            text = convertor(text);
                            editor.replaceSelection(text)
                        }
                    } catch (e) {
                        _this.$message.error('操作失败')
                    }
                }

                let presetMenusMap = {
                    text: [
                        {label: '', divided: true}, // 分割线
                        {
                            label: `upper`,
                            icon: 'el-icon-magic-stick',
                            onClick: () => {
                                convertText(function (s) {
                                    if (!s) {
                                        return s;
                                    }
                                    return s.toUpperCase();
                                })
                            }
                        },
                        {
                            label: `lower`,
                            icon: 'el-icon-magic-stick',
                            onClick: () => {
                                convertText(function (s) {
                                    if (!s) {
                                        return s;
                                    }
                                    return s.toLowerCase();
                                })
                            }
                        },
                        {
                            label: `replace`,
                            icon: 'el-icon-magic-stick',
                            onClick: () => {
                                let searchText = '';
                                let replaceText = '';
                                this.$prompt('请输入要查找的字符串', '输入框', {
                                    confirmButtonText: '确定',
                                    cancelButtonText: '取消',
                                }).then(({value}) => {
                                    searchText = value;
                                    this.$prompt('请输入要替换为的字符串', '输入框', {
                                        confirmButtonText: '确定',
                                        cancelButtonText: '取消',
                                    }).then(({value}) => {
                                        replaceText = value;
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return s.replaceAll(searchText, replaceText);
                                        })
                                    })
                                })


                            }
                        },
                        {
                            label: `regexp_replace`,
                            icon: 'el-icon-magic-stick',
                            onClick: () => {
                                let searchText = '';
                                let replaceText = '';
                                this.$prompt('请输入要查找的正则', '输入框', {
                                    confirmButtonText: '确定',
                                    cancelButtonText: '取消',
                                }).then(({value}) => {
                                    searchText = value;
                                    this.$prompt('请输入要替换为的字符串', '输入框', {
                                        confirmButtonText: '确定',
                                        cancelButtonText: '取消',
                                    }).then(({value}) => {
                                        replaceText = value;
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return s.replaceAll(new RegExp(searchText, 'g'), replaceText);
                                        })
                                    })
                                })


                            }
                        },
                        {
                            label: 'encode/decode',
                            icon: 'el-icon-magic-stick',
                            children: [
                                {label: '', divided: true}, // 分割线
                                {
                                    label: `encode_base64`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return btoa(s);
                                        })
                                    }
                                },
                                {
                                    label: `decode_base64`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return atob(s);
                                        })
                                    }
                                },

                            ]
                        },
                        {
                            label: 'SQL escape',
                            icon: 'el-icon-magic-stick',
                            children: [
                                {label: '', divided: true}, // 分割线
                                {
                                    label: `escape_sql`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return "'" + s.replaceAll("'", "''") + "'";
                                        })
                                    }
                                },
                                {
                                    label: `unescape_sql`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            if (s.startsWith("'")) {
                                                s = s.substring(1);
                                            }
                                            if (s.endsWith("'")) {
                                                s = s.substring(0, s.length - 1);
                                            }
                                            return s.replaceAll("''", "'");
                                        })
                                    }
                                },
                            ]
                        },
                        {
                            label: 'Json Convert',
                            icon: 'el-icon-magic-stick',
                            children: [
                                {label: '', divided: true}, // 分割线
                                {
                                    label: `to_json`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return JSON.stringify(s);
                                        })
                                    }
                                },
                                {
                                    label: `parse_json`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            let obj = JSON.parse(s);
                                            if (typeof obj == 'string') {
                                                return obj + '';
                                            }
                                            return JSON.stringify(obj, null, '    ')
                                        })
                                    }
                                },
                                {
                                    label: `format_json`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            let obj = JSON.parse(s);
                                            return JSON.stringify(obj, null, '    ')
                                        })
                                    }
                                },
                            ]
                        },

                    ],
                    sql: [
                        {
                            label: 'SQL segments',
                            icon: 'el-icon-magic-stick',
                            children: [
                                {label: '', divided: true}, // 分割线
                                {
                                    label: `count(1)`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return 'select count(1) \nfrom ' + s + '\nwhere 1=1 \n';
                                        })
                                    }
                                },
                                {
                                    label: `select`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return 'select * \nfrom ' + s + '\nwhere 1=1 \n';
                                        })
                                    }
                                },
                                {
                                    label: `update`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return 'update ' + s + '\n set \n\nwhere  \n';
                                        })
                                    }
                                },
                                {
                                    label: `delete`,
                                    icon: 'el-icon-magic-stick',
                                    onClick: () => {
                                        convertText(function (s) {
                                            if (!s) {
                                                return s;
                                            }
                                            return 'delete from ' + s + '\nwhere  \n';
                                        })
                                    }
                                },
                            ]
                        },
                        {label: '', divided: true}, // 分割线
                        ...((typeof sqlFormatter != 'object') ? [] : [{
                            label: `format sql`,
                            icon: 'el-icon-magic-stick',
                            onClick: () => {
                                let _this = this;
                                convertText(function (s) {
                                    if (!s) {
                                        return s;
                                    }
                                    return _this.formatSql(s);
                                })
                            }
                        }]),
                    ],
                    'json-editor': [
                        {label: '', divided: true}, // 分割线
                        {
                            label: `Json Editor`,
                            icon: 'el-icon-magic-stick',
                            onClick: () => {
                                let text = editor.getValue();
                                this.showJsonEditor(text, (res) => {
                                    editor.setValue(res);
                                });

                            }
                        },
                    ]
                }
                let menus = [...presetMenusMap.text]
                categoryList = categoryList || []
                if (categoryList && categoryList.length > 0) {
                    for (let i = 0; i < categoryList.length; i++) {
                        let category = categoryList[i];
                        if (category == 'text') {
                            continue;
                        }
                        menus.push(...presetMenusMap[category])
                    }
                }
                this.$contextmenu({
                    items: menus,
                    event, // 必须传入 event 以确定位置
                    zIndex: 3000,
                    minWidth: 180
                });
            },
            formatSql(sql) {
                if (!sql) {
                    return sql;
                }

                // 设置选项
                const options = {
                    keywordCase: 'lower',
                    indent: '\t'
                };

                // 格式化SQL
                const formatted = sqlFormatter.format(sql, options);
                return formatted;
            },
            initEditor() {
                if (this.editor) {
                    try {
                        this.editor.toTextArea()
                    } catch (e) {

                    }
                }
                this.editor = null;

                let _this = this;

                function asyncHint(editor, callback, options) {
                    let cur = editor.getCursor();
                    let token = editor.getTokenAt(cur);
                    let prefix = token.string;

                    let items = _this.editorCompletionItemCollector(prefix) || []
                    let result = []
                    if (result && result.list) {
                        items = [...items, ...result.list]
                    }
                    callback({
                        list: items,
                        from: CodeMirror.Pos(cur.line, token.start),
                        to: CodeMirror.Pos(cur.line, token.end)
                    });
                }

                asyncHint.async = true;
                asyncHint.supportsSelection = true;

                let dom = this.$refs.refEditor;
                this.editor = CodeMirror.fromTextArea(dom, {  // 标识到textarea
                    value: "",  // 文本域默认显示的文本
                    mode: "groovy",  // 模式
                    theme: "idea",  // CSS样式选择
                    indentUnit: 2,  // 缩进单位，默认2
                    smartIndent: true,  // 是否智能缩进
                    tabSize: 4,  // Tab缩进，默认4
                    readOnly: false,  // 是否只读，默认false
                    showCursorWhenSelecting: true,
                    hintOptions: {
                        completeSingle: false,
                        hint: asyncHint,
                    },
                    lineNumbers: true  // 是否显示行号
                    // .. 还有好多，翻译不完。需要的去看http://codemirror.net/doc/manual.html#config
                });
                this.editor.on("keypress", () => {
                    //编译器内容更改事件
                    this.editor.showHint();
                });
                this.editor.setValue(this.form.script || '');
                this.editor.on('change', () => {
                    this.form.script = this.editor.getValue();
                });
            },
            initLangEditor(editorProp, editorRef, editorLang, afterCallback) {
                let bts = new Date().getTime()
                let initEditorTask = () => {
                    if (this.langEditors[editorProp]) {
                        try {
                            this.langEditors[editorProp].toTextArea()
                        } catch (e) {

                        }
                    }
                    this.langEditors[editorProp] = null;

                    let dom = this.$refs[editorRef];
                    if (!dom) {
                        let cts = new Date().getTime();
                        if (cts - bts < 3000) {
                            setTimeout(initEditorTask, 30);
                        }
                        return
                    }
                    this.langEditors[editorProp] = CodeMirror.fromTextArea(dom, {  // 标识到textarea
                        value: "",  // 文本域默认显示的文本
                        mode: editorLang || '',  // 模式
                        theme: "idea",  // CSS样式选择
                        indentUnit: 2,  // 缩进单位，默认2
                        smartIndent: true,  // 是否智能缩进
                        tabSize: 4,  // Tab缩进，默认4
                        readOnly: false,  // 是否只读，默认false
                        showCursorWhenSelecting: true,
                        hintOptions: {
                            completeSingle: false,
                        },
                        lineNumbers: true  // 是否显示行号
                        // .. 还有好多，翻译不完。需要的去看http://codemirror.net/doc/manual.html#config
                    });
                    this.langEditors[editorProp].on("keypress", () => {
                        //编译器内容更改事件
                        this.langEditors[editorProp].showHint();
                    });
                    if (afterCallback) {
                        afterCallback(this.langEditors[editorProp], dom)
                    }
                }

                initEditorTask()
            },
            initTextViewerEditor() {
                this.initLangEditor('textViewerEditor', 'refTextViewerEditor', this.dialog.textViewer.lang, (editor, dom) => {
                    editor.display.wrapper.style.height = Math.max(Math.round(window.innerHeight * 0.85 - 270), 320) + 'px';
                    editor.setValue(this.dialog.textViewer.text || '');
                    editor.on('change', () => {
                        this.dialog.textViewer.text = editor.getValue();
                    });

                })
            },
            onTextViewerLangChange() {
                this.initTextViewerEditor()
            },
            initStoreData() {
                let reset = new URL(window.location.href).searchParams.get('reset');
                if (reset != 'true') {
                    this.loadData();
                }
                setInterval(() => {
                    this.storeData();
                }, 1000);
            },
            doResetData() {
                let newData = this.getDefaultData();
                Object.keys(newData).forEach(k => {
                    this.$data[k] = newData[k];
                })
            },
            onViewText(obj, title, lang) {
                if (title && title.length > 0) {
                    this.dialog.textViewer.title = title;
                } else {
                    this.dialog.textViewer.title = '文本浏览';
                }
                let text = ''
                if (typeof obj == 'string') {
                    text = obj;
                } else {
                    text = JSON.stringify(obj, null, '    ');
                }
                this.dialog.textViewer.lang = lang || 'text';
                this.dialog.textViewer.text = text;
                this.dialog.textViewer.show = true;
                setTimeout(() => {
                    this.initTextViewerEditor()
                }, 200)
            },
            showJsonEditor(text, callback) {
                try {
                    JSON.parse(text)
                } catch (e) {
                    this.$message.warning('JSON可能不正确，编辑器可能无法正常工作')
                }
                this.dialog.jsonEditor.text = text;
                this.dialog.jsonEditor.saveCallback = callback;
                this.dialog.jsonEditor.show = true;

                let _this = this;
                setTimeout(() => {
                    // create the editor
                    let container = this.$refs.refJsonEditor;


                    //  mode: 'tree' (default), 'view', 'form', 'code', 'text', 'preview',
                    // editor.getTextSelection()
                    // editor.set(initialJson)
                    // editor.getText()
                    // editor.setText(jsonString)
                    if (!this.langEditors.jsonEditor || !this.langEditors.jsonEditor.getText) {
                        const options = {
                            mode: 'tree', // default mode
                            modes: ['tree', 'code', 'form', 'text', 'view', 'preview'], // all support change ode
                            mainMenuBar: true,
                            navigationBar: true,
                            statusBar: true,
                            onChangeText: function (text) { // content change callback
                                _this.dialog.jsonEditor.text = text;
                            }
                        }
                        this.langEditors.jsonEditor = new JSONEditor(container, options)
                    }

                    // set json
                    try {
                        this.langEditors.jsonEditor.setText(this.dialog.jsonEditor.text);
                    } catch (e) {
                        this.$message.warning('JSON可能不正确，编辑器可能无法正常工作')
                    }
                }, 300)
            },
            onSaveJsonEditorContent() {
                if (!this.langEditors.jsonEditor) {
                    this.dialog.jsonEditor.show = false;
                    return
                }
                let content = this.langEditors.jsonEditor.getText()
                let callback = this.dialog.jsonEditor.saveCallback;
                if (callback) {
                    callback(content)
                }
                this.dialog.jsonEditor.show = false;
            }

        }
    })
    let defaultConfig = {
        baseURL: './',
        timeout: 10 * 60 * 1000,
        responseType: 'json'
    }
    let request = axios.create(defaultConfig)
    window.app.$axios = request
    window.app.$mount('#app')
</script>
