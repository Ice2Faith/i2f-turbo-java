<div id="app">
    <!-- 顶部配置栏：鼠标悬浮展开，离开折叠 -->
    <div class="top-config-bar" @mouseenter="metas.showConfig=true" @mouseleave="metas.showConfig=false">
        <div class="top-config-title">
            <i class="el-icon-setting"></i>
            <span style="margin-left:6px;font-weight:600;">AI 配置</span>
            <span class="config-summary">
                {{ tipTopBaseUrl }}&nbsp; |&nbsp;{{ tipTopModelName }}
            </span>
            <span class="config-hint">鼠标悬浮展开配置</span>
        </div>
        <transition name="el-zoom-in-top">
            <el-card shadow="never" v-show="metas.showConfig" class="config-card-block">
                <el-divider>连接证书<i class="el-icon-d-caret"></i></el-divider>
                <el-input clearable
                          type="textarea"
                          :rows="3"
                          placeholder="请输入连接证书"
                          v-model="metas.cert"
                          @change="onCertChange">
                </el-input>
                <el-divider>OpenAi 操作</el-divider>
                <el-form inline size="small">
                    <el-form-item>
                        <el-button size="medium" @click="doResetData">重置</el-button>
                        <el-divider direction="vertical"></el-divider>
                    </el-form-item>
                    <el-form-item label="预设地址">
                        <el-select v-model="form.presetBaseUrl"
                                   placeholder="选择预设 Base URL"
                                   style="width:220px;"
                                   @change="onSelectPresetBaseUrl"
                                   clearable>
                            <el-option
                                    v-for="item in metas.presetBaseUrlList"
                                    :key="item.value"
                                    :label="item.label"
                                    :value="item.value">
                            </el-option>
                        </el-select>
                    </el-form-item>
                    <el-form-item label="Base URL">
                        <el-input v-model="form.meta.baseUrl"
                                  placeholder="https://api.openai.com/v1"
                                  style="width:320px;"></el-input>
                    </el-form-item>
                    <el-form-item>
                        <span slot="label">
                            Api Key
                            <el-link v-if="currentPresetBaseUrlItem?.apiKey?.url" :href="currentPresetBaseUrlItem?.apiKey?.url" target="_blank">
                                <el-popover
                                        placement="top-start"
                                        title="说明"
                                        width="200"
                                        trigger="hover"
                                        :content="currentPresetBaseUrlItem?.apiKey?.tips">

                                    <i slot="reference" class="el-icon-question"></i>
                                </el-popover>
                            </el-link>
                        </span>
                        <el-input v-model="form.meta.apiKey"
                                  placeholder="sk-xxxx"
                                  style="width:260px;"></el-input>
                    </el-form-item>
                    <el-form-item label="预设模型" v-if="currentPresetModelList && currentPresetModelList.length>0">
                        <el-select v-model="form.modelName"
                                   placeholder="选择预设 Model"
                                   style="width:220px;"
                                   clearable>
                            <el-option
                                    v-for="item in currentPresetModelList"
                                    :key="item.value"
                                    :label="item.label+'['+item.value+']'"
                                    :value="item.value">
                            </el-option>
                        </el-select>
                    </el-form-item>
                    <el-form-item label="Model">
                        <el-input v-model="form.modelName"
                                  placeholder="qwen-plus"
                                  style="width:180px;"></el-input>
                    </el-form-item>
                </el-form>
            </el-card>
        </transition>
    </div>

    <!-- 主体：左侧会话列表 + 右侧聊天区 -->
    <div class="main-container">
        <!-- 左侧会话列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span>会话列表</span>
                <el-button type="primary" size="mini" icon="el-icon-plus" @click="createSession">新建</el-button>
            </div>
            <div class="session-list">
                <div v-if="!metas.sessionList || metas.sessionList.length===0" class="session-empty">
                    暂无会话，点击"新建"开始
                </div>
                <div
                        v-for="session in metas.sessionList"
                        :key="session.sessionId"
                        class="session-item"
                        :class="{ 'session-item-active': session.sessionId === metas.activeSessionId }"
                        @click="selectSession(session.sessionId)"
                >
                    <div class="session-title">{{ session.title || '新对话' }}</div>
                    <el-button
                            class="session-delete-btn"
                            type="text"
                            icon="el-icon-delete"
                            size="mini"
                            @click.stop="deleteSession(session.sessionId)"
                    ></el-button>
                </div>
            </div>
        </div>

        <!-- 中间聊天区 -->
        <div class="chat-container">
            <!-- 消息列表 -->
            <div class="message-list" ref="messageList">
                <div v-if="!currentMessages || currentMessages.length===0" class="empty-tip">
                    <i class="el-icon-chat-dot-round"></i>
                    <p>发送消息，开始对话</p>
                </div>
                <div
                        v-for="(msg, idx) in currentMessages"
                        :key="idx"
                        class="message-row"
                        :class="msg.role==='user' ? 'message-row-right' : 'message-row-left'"
                >
                    <div class="message-avatar" :class="msg.role==='user' ? 'avatar-user' : 'avatar-ai'">
                        <i :class="msg.role==='user' ? 'el-icon-user-solid' : 'el-icon-cpu'"></i>
                    </div>
                    <div class="message-bubble" :class="msg.role==='user' ? 'bubble-user' : 'bubble-ai'">
                        <div class="message-role-label">
                            {{ roleLabel(msg.role) }}
                            <i @click="removeSelectMessage(idx)" style="color:red;" class="el-icon-circle-close"></i>
                        </div>
                        <div class="message-content"
                             :class="{'streaming-cursor': metas.streamingStarted && msg.role==='assistant' && idx===currentMessages.length-1}"
                             v-html="renderMarkdown(msg.content)"></div>
                    </div>
                </div>
                <!-- 发送中 loading 气泡：等待首个 token 期间才显示 -->
                <div v-if="metas.sending && !metas.streamingStarted" class="message-row message-row-left">
                    <div class="message-avatar avatar-ai">
                        <i class="el-icon-cpu"></i>
                    </div>
                    <div class="message-bubble bubble-ai">
                        <div class="message-role-label">助手</div>
                        <div class="message-content typing">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部输入区 -->
            <div class="input-area">
                <el-input
                        type="textarea"
                        v-model="form.inputText"
                        :autosize="{ minRows: 2, maxRows: 6 }"
                        placeholder="输入消息，Ctrl+Enter 快速发送"
                        @keydown.ctrl.enter.native="sendMessage"
                        :disabled="metas.sending"
                        resize="none"
                ></el-input>
                <div class="input-actions">
                    <el-checkbox v-model="form.encryptOutput">输出加密</el-checkbox>
                    <el-select v-model="form.messageType"
                               placeholder="发送消息类型"
                               style="width:160px;">
                        <el-option
                                v-for="item in metas.roleList"
                                :key="item.value"
                                :label="item.label"
                                :value="item.value">
                        </el-option>
                    </el-select>
                    <el-button size="small" plain type="warning" @click="clearCurrentSession" :disabled="metas.sending">
                        <i class="el-icon-delete"></i> 清空会话
                    </el-button>
                    <el-button type="primary" size="small" @click="sendMessage"
                               :loading="metas.sending"
                               :disabled="!form.inputText || !form.inputText.trim()">
                        发送 <i class="el-icon-s-promotion"></i>
                    </el-button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

            this.initDefaultSessionView()
        },
        watch: {
            'metas.activeSessionId': {
                handler: function (newVal, oldVal) {
                    this.$nextTick(() => this.scrollToBottom());
                }
            }

                let sid = this.metas.activeSessionId;
                if (!sid) {
                    return [];

                return this.metas.historyMessageMap[sid] || [];

            currentPresetBaseUrlItem(){
                return this.metas.presetBaseUrlList.filter(e=>e.value==this.form.meta.baseUrl)[0]
            },
            currentPresetModelList(){
                let item=this.currentPresetBaseUrlItem || {}
              return item.models || []
            },
            currentPresetModelItem(){
              let item=this.currentPresetBaseUrlItem || {};
              let models=item.models || [];
              return models.filter(e=>e.value==this.form.modelName)[0]
            },
            tipTopBaseUrl(){
                let item=this.currentPresetBaseUrlItem || {};
                return item.label
                    || this.form.meta.baseUrl
                    || '(未配置 Base URL)'
            },
            tipTopModelName(){
                let item=this.currentPresetModelItem
                let selection=null
                if(item){

                }

                if (reset != 'true') {

                let newData = this.getDefaultData();
                Object.keys(newData).forEach(k => {

            getTransfer() {
                let cert = this.metas.cert;
                if (!cert || cert.length == 0) {
                    cert = '';
                }
                cert = cert.trim();
                if (!cert || cert.length == 0) {
                    throw new Error('请先填写连接证书')
                }
                let ex = null;
                for (let i = 0; i < 3; i++) {
                    try {
                        let keyPair = OpsSecureHelper.deserializeKeyPair(cert)
                        return new OpsSecureTransfer(keyPair)
                    } catch (e) {
                        ex = e;
                    }
                }
                if (!ex) {
                    ex = new Error('init transfer error')
                }
                throw ex;
            },
            transferSend(req){
                let ex=null;
                for (let i = 0; i < 5; i++) {
                    try{
                        let transfer = this.getTransfer();
                        return transfer.send(req);
                    }catch (e){
                        ex=e;
                    }
                }
                if(ex!=null){
                    throw ex;
                }
            },
            transferRecv(req){
                let ex=null;
                for (let i = 0; i < 5; i++) {
                    try{
                        let transfer = this.getTransfer();
                        return transfer.recv(req);
                    }catch (e){
                        ex=e;
                    }
                }
                if(ex!=null){
                    throw ex;
                }
            },
            messageError(msg,limit){
                window._lastError=msg;
                if(limit && limit>=0) {
                    if (msg && msg.length > limit) {
                        msg = msg.substring(0, limit) + '...'

                }
                this.$message.error(msg)

            assignOpenAiMeta(req) {
                req.meta = {...this.form.meta};
                if (!req.meta.baseUrl) {
                    throw new Error('请先填写 Base URL');
                }
                if (!req.meta.apiKey) {
                    throw new Error('请先填写 Api Key');
                }
                let baseUrl = req.meta.baseUrl.trim();
                if(baseUrl.endsWith('/')){
                    baseUrl=baseUrl.substring(0,baseUrl.length-1);
                }
                baseUrl = baseUrl + '/chat/completions';
                req.meta.baseUrl=baseUrl;

                return req;
            },

            // ---- 会话管理 ----
            genId() {
                return 'sid_' + new Date().getTime() + '_' + Math.random().toString(36).substr(2, 8);
            },
            createSession() {
                let sessionId = this.genId();
                this.metas.sessionList.unshift({sessionId, title: '新对话'});
                this.$set(this.metas.historyMessageMap, sessionId, []);
                this.metas.activeSessionId = sessionId;
                this.$nextTick(() => this.scrollToBottom());
            },
            selectSession(sessionId) {
                this.metas.activeSessionId = sessionId;

            deleteSession(sessionId) {
                this.$confirm('确认删除该会话及所有历史消息？', '提示', {type: 'warning'})
                    .then(() => {
                        let idx = this.metas.sessionList.findIndex(s => s.sessionId === sessionId);
                        if (idx >= 0) {
                            this.metas.sessionList.splice(idx, 1);
                        }
                        this.$delete(this.metas.historyMessageMap, sessionId);
                        if (this.metas.activeSessionId === sessionId) {
                            if (this.metas.sessionList.length > 0) {
                                this.metas.activeSessionId = this.metas.sessionList[0].sessionId;
                            } else {
                                this.createSession();
                            }
                        }
                    }).catch(() => {
                });
            },
            clearCurrentSession() {
                let sid = this.metas.activeSessionId;
                if (!sid) {
                    return;
                }
                this.$confirm('确认清空当前会话的所有消息？', '提示', {type: 'warning'})
                    .then(() => {
                        this.$set(this.metas.historyMessageMap, sid, []);
                        let session = this.metas.sessionList.find(s => s.sessionId === sid);
                        if (session) {
                            session.title = '新对话';
                        }
                    }).catch(() => {
                });
            },

            // ---- 工具方法 ----
            roleLabel(role) {
                let item=this.metas.roleList.filter(e=>e.value==role)[0] || {}
                return item.label || role;
            },
            scrollToBottom() {
                let el = this.$refs.messageList;
                if (el) {
                    el.scrollTop = el.scrollHeight;
                }
            },
            // 渲染 Markdown（流式输出期间增量内容也可安全解析）
            renderMarkdown(content) {
                if (!content) {
                    return '';
                }
                if (!this.$md) {
                    return content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                }
                try {
                    return this.$md.render(content);
                } catch (e) {
                    return content;
                }
            },

            // ---- 发送消息（支持 SSE 流式输出 + 打字机效果）----
            async sendMessage() {
                let text = (this.form.inputText || '').trim();
                if (!text) {
                    return;
                }

                // 确保有活跃会话
                if (!this.metas.activeSessionId) {
                    this.createSession();
                }
                let sid = this.metas.activeSessionId;
                if (!this.metas.historyMessageMap[sid]) {
                    this.$set(this.metas.historyMessageMap, sid, []);
                }
                let messages = this.metas.historyMessageMap[sid];

                // 用第一条用户消息作为会话标题
                let session = this.metas.sessionList.find(s => s.sessionId === sid);
                if (session && (!session.title || session.title === '新对话')) {
                    session.title = text.length > 20 ? text.substring(0, 20) + '...' : text;
                }

                // 追加用户消息，构建 API 请求消息列表
                messages.push({role: this.form.messageType, content: text});
                this.form.inputText = '';
                // 快照当前历史消息作为请求内容（不包括将要添加的助手占位）
                let apiMessages = messages.map(m => ({role: m.role, content: m.content}));
                this.$nextTick(() => this.scrollToBottom());

                this.metas.sending = true;
                this.metas.streamingStarted = false;

                // 添加助手消息占位，用于流式内容逐步填充
                messages.push({role: 'assistant', content: ''});
                let assistantIdx = messages.length - 1;

                let _this = this;
                let encryptOutput=this.form.encryptOutput;
                // SSE 消息处理：逐步写入助手消息内容，实现打字机效果
                function handleChunk(raw) {
                    if (!raw || raw === '[DONE]') {
                        return;
                    }
                    try {
                        let json = JSON.parse(raw);
                        if (json.code == 200) {
                            //console.log(res.data)
                            if(encryptOutput){
                                json = _this.transferRecv(json.data) || null
                                json=JSON.parse(json)
                            }else{
                                json=JSON.parse(json.data);
                            }
                        } else {
                            _this.messageError(json.msg,300)
                        }
                        let delta = json.choices && json.choices[0] && json.choices[0].delta;
                        let content = (delta && delta.content) ? delta.content : '';
                        if (content) {
                            if (!_this.metas.streamingStarted) {
                                _this.metas.streamingStarted = true;
                            }
                            messages[assistantIdx].content += content;
                            _this.$nextTick(() => _this.scrollToBottom());
                        }
                    } catch (e) { /* 忽略解析错误 */
                    }
                }

                try {
                    let req = this.assignOpenAiMeta({
                        completion: {
                            model: this.form.modelName,
                            messages: apiMessages,
                            stream: true,
                        }
                    });
                    req.encryptOutput=encryptOutput;
                    req=this.transferSend(req);

                    // 原生 fetch + ReadableStream 解析 SSE
                    const response = await fetch('./stream',
                        {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(req)
                        }
                    );
                    if (!response.ok) {
                        let errData = {};
                        try {
                            errData = await response.json();
                        } catch (e) {
                        }
                        throw new Error((errData.error && errData.error.message) ? errData.error.message : ('HTTP ' + response.status));
                    }
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buf = '';
                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) {
                            break;
                        }
                        buf += decoder.decode(value, {stream: true});
                        let lines = buf.split('\n');
                        buf = lines.pop(); // 保留未完整的行
                        for (let line of lines) {
                            line = line.trim();
                            if (!line || !line.startsWith('data:')) {
                                continue;
                            }
                            handleChunk(line.slice(5).trim());
                        }
                    }


                    if (!messages[assistantIdx].content) {
                        messages[assistantIdx].content = '[未收到任何内容]';
                    }
                } catch (e) {
                    let errMsg = '请求失败';
                    if (e.response && e.response.data) {
                        let d = e.response.data;
                        errMsg = (d.error && d.error.message) ? d.error.message : JSON.stringify(d);
                    } else if (e.message) {
                        errMsg = e.message;
                    }
                    this.messageError(errMsg, 300);
                    if (messages[assistantIdx] !== undefined) {
                        messages[assistantIdx].content = messages[assistantIdx].content || ('[\u8bf7\u6c42\u9519\u8bef] ' + errMsg);
                    }
                } finally {
                    this.metas.sending = false;
                    this.metas.streamingStarted = false;
                    this.$nextTick(() => this.scrollToBottom());
                }
            },
            removeSelectMessage(index){
                let sid = this.metas.activeSessionId;
                if (!sid) {
                    return
                }
                let list=this.metas.historyMessageMap[sid]
                if(!list){
                    return
                }
                list.splice(index,1)
                this.$set(this.metas.historyMessageMap,sid,list)
            }
        }
    });

        timeout: 10 * 60 * 1000,
        responseType: 'json'
    };

    }) : null;
