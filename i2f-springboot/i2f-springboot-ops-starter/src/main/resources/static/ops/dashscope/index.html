<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 1小时缓存过期 -->
    <meta http-equiv="Cache-Control" content="max-age=3600, public">
    <title>DashScope Home</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="../lib/vue/vue-2.js"></script>
    <script src="../lib/moment/moment-2.24.0.js"></script>
    <script src="../lib/element-ui/element-ui-2.15.10.js"></script>
    <link rel="stylesheet" href="../lib/element-ui/element-ui-2.15.10.css"/>
    <link rel="stylesheet" href="../lib/element-ui/element-ui-2.15.10-icon.css"/>
    <link href="../lib/element-ui/fonts/element-icons.ttf"/>
    <link href="../lib/element-ui/fonts/element-icons.woff"/>

    <script src="../lib/axios/axios-1.1.3.min.js"></script>
    <script src="../lib/axios/qs.js"></script>
</head>
<body>
<div id="app">
    <el-backtop></el-backtop>
    <el-card shadow="never">
        <div slot="header">
            <el-row type="flex" style="line-height: 40px;">
                <el-col :span="20">
                    <span>DashScope Home</span>
                </el-col>
                <el-col :span="4">
                    <el-input v-model="filterText" placeholder="搜索关键字"></el-input>
                </el-col>
            </el-row>
        </div>
        <el-row :gutter="15" v-loading="menuLoading">
            <el-card v-for="(group,groupIndex) in menuGroups" shadow="never" style="margin-bottom: 12px;">
                <div slot="header">
                    <span>{{group.group}}</span>
                </div>
                <el-col :span="6" v-for="item in group.menus">
                    <el-result  :title="item.title" style="border: solid 1px #777; border-radius: 5px;margin-bottom: 15px;">
                        <template slot="icon">
                            <a :href="item.href" target="_blank">
                                <i :class="item.icon||'el-icon-monitor'" style="font-size: 32px"></i>
                            </a>
                        </template>
                        <template slot="subTitle">
                            <span style="color: #777;">{{item.subTitle}}</span>
                        </template>
                        <template slot="extra">
                            <a :href="item.href" target="_blank">
                                访问
                            </a>
                        </template>
                    </el-result>
                </el-col>
            </el-card>
        </el-row>
    </el-card>
</div>
</body>

<script>
    window.app = new Vue({
        components: {},
        data() {
            return {
                filterText: '',
                menuLoading: false,
                menus: [],
                additionalMenus: [],
                defaultMenus: [
                    {
                        title: '文生图（阿里）',
                        subTitle: '用文本描述生成图片或参考生成',
                        icon: 'el-icon-picture-outline',
                        href: './image/wan/text-2-image.html',
                        group: '10/Image generation',
                    },
                    {
                        title: 'Kling 可灵 文生图（快手）',
                        subTitle: '用文本描述生成图片或参考生成',
                        icon: 'el-icon-picture-outline',
                        href: './image/kling/text-2-image.html',
                        group: '10/Image generation',
                    },
                    {
                        title: 'HappyHorse 视频生成（阿里）',
                        subTitle: '文生视频、首帧视频、参考视频、视频编辑',
                        icon: 'el-icon-video-camera',
                        href: './video/happyhorse/index.html',
                        group: '20/Video generation',
                    },
                    {
                        title: 'Vidu 视频生成（生数科技）',
                        subTitle: '文生视频、首帧视频、参考视频',
                        icon: 'el-icon-video-camera',
                        href: './video/vidu/index.html',
                        group: '20/Video generation',
                    },
                    {
                        title: 'PixVerse 爱诗 视频生成（字节）',
                        subTitle: '文生视频、首帧视频、参考视频',
                        icon: 'el-icon-video-camera',
                        href: './video/pixverse/index.html',
                        group: '20/Video generation',
                    },
                    {
                        title: 'Kling 可灵 视频生成（快手）',
                        subTitle: '文生视频、首帧视频、参考视频',
                        icon: 'el-icon-video-camera',
                        href: './video/kling/index.html',
                        group: '20/Video generation',
                    },
                    {
                        title: '动作迁移/视频换人（阿里）',
                        subTitle: '将视频中的动作用图片中的人物进行表示',
                        icon: 'el-icon-coin',
                        href: './video/wan/instead-people.html',
                        group: '30/Video fake',
                    },
                    {
                        title: '数字人视频（阿里）',
                        subTitle: '用音频和图片中的人物进行对口型',
                        icon: 'el-icon-user',
                        href: './video/wan/digital-people.html',
                        group: '40/Video digital',
                    },
                    {
                        title: '3D模型生成（VAST）',
                        subTitle: '文生模型、图生模型',
                        icon: 'el-icon-place',
                        href: './d3/tripo/tripo-d3.html',
                        group: '50/3D Model generation',
                    }
                ]
            }
        },
        created() {

        },
        mounted() {
            this.onLoadMenus();
        },
        watch: {},
        computed: {
            menuGroups(){
                let retMap={}
                let menus=[...this.displayMenus]
                for (let i = 0; i < menus.length; i++) {
                    let item=menus[i]
                    let group=item.group
                    if(!group || group==''){
                        group='10/Default'
                    }
                    group=group.substring(0,1).toUpperCase()+group.substring(1)
                    if(!retMap[group]){
                        retMap[group]=[]
                    }
                    retMap[group].push(item)
                }
                let retList=[];
                Object.keys(retMap).forEach(key=>{
                    retList.push({
                        group: key,
                        menus: retMap[key]
                    })
                })
                retList.sort((v1,v2)=>v1.group.localeCompare(v2.group))
                return retList;
            },
            displayMenus(){
                return this.menus.filter(e=>!e.disabled)
                    .filter(e=>{
                        if(!this.filterText || this.filterText==''){
                            return true;
                        }
                        let ltext = this.filterText.toLowerCase();
                        return e.title.toLowerCase().indexOf(ltext)>=0
                            || e.subTitle.toLowerCase().indexOf(ltext)>=0;
                    })
            }
        },
        methods: {
            onLoadMenus() {
                this.menuLoading = true;
                if (this.menus.length == 0) {
                    this.menus = [...this.defaultMenus, ...this.additionalMenus]
                }
                this.menuLoading = false;
            },
            onClickMenuItem(item) {

            }
        }
    })
    let defaultConfig = {
        baseURL: './',
        timeout: 10 * 60 * 1000,
        responseType: 'json'
    }
    let request = axios.create(defaultConfig)
    window.app.$axios = request
    window.app.$mount('#app')
</script>
<style>

    .list-item {
        margin-top: 3px;
        border-bottom: solid 1px #777;
    }

    .list-item:hover {
        background: lightskyblue;
    }

    .checked-item {
        background: darkorange;
    }

    .scroller {
        height: 260px
    }

    a {
        color: dodgerblue;
        text-decoration: none;
    }

    a:link {
        color: dodgerblue;
    }

    a:visited {
        color: dodgerblue;
    }

    a:hover {
        color: coral;
    }

    a:active {
        color: dodgerblue;
    }

    .el-result__subtitle {
        height: 48px;
    }

    .el-card__header{
        background: linear-gradient(145deg, #bae5ff9e, transparent, transparent);
        animation: aniHtmlHeader 12s infinite;
        background-size: 180%;
    }

    .el-result{
        background: linear-gradient(345deg, #b9d2ffb3, #b9fffab3, transparent, transparent, transparent);
        animation: aniHtml 4s infinite;
        background-size: 300%;
    }

    .el-result__title p {
        white-space: nowrap;
    }

    .el-input__inner{
        background: linear-gradient(312deg, #a5e7ffbf, transparent, transparent);
        animation: aniHtmlHeader 6s infinite;
        background-size: 150%;
    }

    @keyframes aniHtmlHeader {
        0% {
            background-position: 0% 50%;
            filter: hue-rotate(270deg);
        }
        25% {
            background-position: 0% 50%;
            filter: hue-rotate(0deg);
        }
        50% {
            background-position: 30% 50%;
            filter: hue-rotate(90deg);
        }
        50% {
            background-position: 30% 50%;
            filter: hue-rotate(0deg);
        }
        100% {
            background-position: 0% 50%;
            filter: hue-rotate(270deg);
        }
    }

    @keyframes aniHtml {
        0% {
            background-position: 0% 50%;
            filter: hue-rotate(0deg);
        }
        50% {
            background-position: 30% 50%;
            filter: hue-rotate(180deg);
        }
        100% {
            background-position: 0% 50%;
            filter: hue-rotate(360deg);
        }
    }

</style>
</html>
