<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 1小时缓存过期 -->
    <meta http-equiv="Cache-Control" content="max-age=3600, public">
    <title>Ops - Kling 文生图</title>
    <link rel="icon" type="image/png" href="../../favicon.png">
    <script src="../../lib/vue/vue-2.js"></script>
    <script src="../../lib/moment/moment-2.24.0.js"></script>
    <script src="../../lib/element-ui/element-ui-2.15.10.js"></script>
    <link rel="stylesheet" href="../../lib/element-ui/element-ui-2.15.10.css"/>
    <link rel="stylesheet" href="../../lib/element-ui/element-ui-2.15.10-icon.css"/>
    <link href="../../lib/element-ui/fonts/element-icons.ttf"/>
    <link href="../../lib/element-ui/fonts/element-icons.woff"/>
    <script src="../../lib/axios/axios-1.1.3.min.js"></script>
    <script src="../../lib/axios/qs.js"></script>
    <script src="../../lib/sm-crypto-0.3.2.1-RELEASE/sm4.js"></script>
    <script src="../../lib/sm-crypto-0.3.2.1-RELEASE/sm3.js"></script>
    <script src="../../lib/sm-crypto-0.3.2.1-RELEASE/sm2.js"></script>
    <script src="../../lib/base64/Base64.js"></script>
    <script src="../../common/OpsSecureKeyPair.js"></script>
    <script src="../../common/OpsSecureCertPair.js"></script>
    <script src="../../common/OpsSecureDto.js"></script>
    <script src="../../common/OpsSecureHelper.js"></script>
    <script src="../../common/OpsSecureTransfer.js"></script>
    <script src="../../lib/echarts-5/echarts.min.js"></script>
    <!-- 从这里查找 CDN 资源： https://cdnjs.com/libraries/codemirror -->
    <script src="../../lib/codemirror-6.65.7/codemirror.min.js"></script>
    <link rel="stylesheet" href="../../lib/codemirror-6.65.7/codemirror.min.css"/>
    <link rel="stylesheet" href="../../lib/codemirror-6.65.7/addon/hint/show-hint.min.css"/>
    <script src="../../lib/codemirror-6.65.7/addon/hint/show-hint.min.js"></script>
    <link rel="stylesheet" href="../../lib/codemirror-6.65.7/theme/idea.min.css"/>

    <script src="../../lib/codemirror-6.65.7/addon/search/search.min.js"></script>
    <script src="../../lib/codemirror-6.65.7/addon/search/searchcursor.min.js"></script>
    <script src="../../lib/codemirror-6.65.7/addon/search/jump-to-line.min.js"></script>
    <script src="../../lib/codemirror-6.65.7/addon/search/match-highlighter.min.js"></script>

    <script src="../../lib/codemirror-6.65.7/mode/shell/shell.min.js"></script>

    <link rel="stylesheet" href="../../lib/vue-virtual-scroller/vue-virtual-scroller.css"/>
    <script src="../../lib/vue-virtual-scroller/vue-virtual-scroller.min.js"></script>
    <script src="../../lib/crypto-js-4.2.0/crypto-js.min.js"></script>

</head>
<body>
<div id="app">
    <el-row class="cert-block">
        <el-divider>连接证书<i class="el-icon-d-caret"></i></el-divider>
        <el-input
                type="textarea"
                :rows="3"
                placeholder="请输入连接证书"
                v-model="metas.cert"
                @change="onCertChange">
        </el-input>
    </el-row>
    <el-row class="cert-block">
        <el-divider>DashScope 操作<i class="el-icon-d-caret"></i></el-divider>
        <el-form inline label-position="left" label-width="120px">
            <el-form-item>
                <el-row slot="label">
                    Api Key
                    <el-link href="https://bailian.console.aliyun.com/cn-beijing?tab=model#/api-key" target="_blank">
                        <i class="el-icon-question"></i>
                    </el-link>
                </el-row>
                <el-input clearable v-model="form.meta.apiKey" placeholder="Api Key"></el-input>
            </el-form-item>
        </el-form>
    </el-row>


    <el-card shadow="never">
        <el-row style="width: 100%;">
            <el-form inline label-position="top" label-width="120px">
                <el-row type="flex" :gutter="20">
                    <el-col :span="12">
                        <el-form-item label="参考图片" style="width: 100%;">
                            <el-upload
                                    class="upload-image"
                                    ref="uploadImage"
                                    style="display: inline-block;"
                                    action="#"
                                    list-type="picture-card"
                                    :file-list="metas.uploadImageList"
                                    accept=".png,.jpeg,.jpg"
                                    :auto-upload="false"
                                    :on-preview="handlePictureCardPreview"
                                    :on-change="onUploadImageFileChange">
                                <i class="el-icon-plus"></i>
                            </el-upload>
                        </el-form-item>
                    </el-col>
                    <el-col :span="12">
                        <el-form-item label="提示词" style="width: 100%;">
                            <el-input
                                    style="width: 100%"
                                    type="textarea"
                                    :rows="12"
                                    placeholder="正向描述画面细节"
                                    v-model="form.prompt">
                            </el-input>
                        </el-form-item>
                    </el-col>

                </el-row>
            </el-form>

                <el-divider></el-divider>
            <el-form label-position="top" inline label-width="80px">
                <el-row type="flex">
                    <el-col :span="10">
                        <el-row type="flex">
                            <el-form-item>
                                <span slot="label">
                                    模型
                                     <el-popover
                                             placement="top-start"
                                             title="模型类型"
                                             width="280"
                                             trigger="hover">
                                         Omni提供更高的分辨率、连贯组合镜头输出。
                                        <i slot="reference" class="el-icon-question"></i>
                                      </el-popover>
                                </span>
                                <el-select  clearable filterable v-model="form.modelName"  placeholder="模型" style="width: 180px;" >
                                    <el-option
                                            v-for="item in metas.modelList"
                                            :key="item.value"
                                            :label="item.label"
                                            :value="item.value">
                                    </el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="宽高比">
                                <el-select  clearable filterable v-model="form.ratio"  placeholder="宽高比" style="width: 80px">
                                    <el-option
                                            v-for="item in metas.ratioList"
                                            :key="item.value"
                                            :label="item.label"
                                            :value="item.value">
                                    </el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="分辨率">
                                <el-select  clearable filterable v-model="form.resolution"  placeholder="分辨率" style="width: 80px">
                                    <el-option
                                            v-for="item in resolutionList"
                                            :key="item.value"
                                            :label="item.label"
                                            :value="item.value">
                                    </el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item v-if="supportOmni" label="结果类型">
                                <el-select  clearable filterable v-model="form.resultType"  placeholder="结果类型" style="width: 140px">
                                    <el-option
                                            v-for="item in metas.resultTypeList"
                                            :key="item.value"
                                            :label="item.label"
                                            :value="item.value">
                                    </el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="输出数量">
                                <el-input-number v-model="form.count" :min="1" :max="metas.modelMaxOutputCount" size="small"/>
                            </el-form-item>
                            <el-form-item label="选项">
                                <el-checkbox v-model="form.watermark">带水印</el-checkbox>
                            </el-form-item>

                        </el-row>
                    </el-col>
                    <el-col :span="4">
                        <el-row type="flex" justify="center">
                            <el-form-item label="操作">
                                <el-button v-loading="metas.resultTaskLoading" size="medium"
                                           type="primary"
                                           @click="onExecute">
                                    执行
                                </el-button>
                                <el-popover
                                        placement="top-start"
                                        title="执行"
                                        width="360"
                                        trigger="hover">
                                    点击执行之后，将会提交异步任务给平台。<br/>
                                    后续可以通过下面的[查询]按钮获取运行结果，预览和下载结果图片。<br/>
                                    只要提交任务给平台，就会进行计费了，如果只是单纯查询运行结果，不会计费。
                                    <i slot="reference" class="el-icon-question"></i>
                                </el-popover>
                            </el-form-item>
                        </el-row>
                    </el-col>
                    <el-col :span="10">
                        <el-row type="flex" justify="end">
                            <el-form-item label="拓展">
                                <el-button size="medium"
                                           @click="metas.resultImages=[]">
                                    清空结果
                                </el-button>
                            </el-form-item>
                        </el-row>
                    </el-col>
                </el-row>


                <!-- 结果展示 -->
                <el-row v-if="metas.resultTaskId">
                    <el-divider></el-divider>

                    <el-form-item>
                        <el-input clearable v-model="metas.resultTaskId" placeholder="Task Id"></el-input>
                    </el-form-item>

                    <el-form-item>
                        <el-button v-loading="metas.resultLoading" size="medium"
                                   type="primary"
                                   @click="onQueryStatus">
                            查询
                        </el-button>
                    </el-form-item>
                </el-row>
                <el-row v-loading="metas.resultLoading" type="flex" :gutter="12">
                    <el-col :span="resultColumnsSpan" v-for="(item,index) in metas.resultImages">
                        <img width="100%" :src="item.image" alt="" @click="handlePictureCardPreview(item.image)">
                    </el-col>
                </el-row>
            </el-form>

        </el-row>
    </el-card>


    <el-dialog :visible.sync="dialog.imagePreview.show" style="text-align: center;">
        <img width="100%" :src="dialog.imagePreview.imageUrl" alt="">
    </el-dialog>

</div>
</body>
<script>
    Vue.use(VueVirtualScroller.default);
    window.app = new Vue({
        components: {},
        data() {
            return this.getDefaultData()
        },
        created() {
            this.initStoreData();
            this.initBroadcast();
        },
        mounted() {

        },
        watch: {},
        computed: {
            supportOmni(){
                return this.form.modelName.indexOf('omni')>=0
            },
            resolutionList(){
                if(this.supportOmni){
                    return this.metas.resolutionOmniList;
                }
                return this.metas.resolutionList;
            },
            resultColumnsSpan(){
                if(this.metas.resultImages.length<=4){
                    return Math.floor(24/this.metas.resultImages.length)
                }
                return 6;
            }
        },
        methods: {
            handlePictureCardPreview(url) {
                this.dialog.imagePreview.imageUrl = url.url || url;
                this.dialog.imagePreview.show = true;
            },
            getDefaultData() {
                return {
                    opsBroadcastChannel: null,
                    langEditors: {},
                    completions: [],
                    storage: {},
                    metas: {
                        cert: '',
                        uploadImageLoading: false,
                        uploadImageList: [],
                        resultTaskId: '',
                        resultLoading: false,
                        resultImages:[],
                        langList: [
                            {label: 'Text', value: 'text'},
                        ],
                        modelList: [
                            {label: 'Kling-v3', value: 'kling/kling-v3-image-generation'},
                            {label: 'Kling-v3-Omni', value: 'kling/kling-v3-omni-image-generation'},
                        ],
                        modelMaxOutputCount: 9,
                        ratioList:[
                            {label: '16:9', value: '16:9'},
                            {label: '9:16', value: '9:16'},
                            {label: '1:1', value: '1:1'},
                        ],
                        resolutionList:[
                            {label: '1k', value: '1k'},
                            {label: '2k', value: '2k'},
                        ],
                        resolutionOmniList:[
                            {label: '1k', value: '1k'},
                            {label: '2k', value: '2k'},
                            {label: '4k', value: '4k'},
                        ],
                        resultTypeList:[
                            {label: '单图。批量生成时仅风格相似，无分镜关联', value: 'single'},
                            {label: '组图。生成具有叙事/视觉连续性的分镜系列图像', value: 'series'},
                        ],
                    },
                    drawer: {},
                    dialog: {
                        imagePreview: {
                            show: false,
                            imageUrl: ''
                        }
                    },
                    form: {
                        meta: {
                            apiKey: '',
                        },
                        modelName: 'kling/kling-v3-image-generation',
                        imageUrl: '',
                        prompt: '',
                        ratio: '16:9',
                        resolution: '1k',
                        resultType: 'single',
                        watermark: false,
                        count: 4,
                    }
                }
            },
            initBroadcast() {
                this.opsBroadcastChannel = new BroadcastChannel('ops_station_broadcast');

                setInterval(() => {
                    this.opsBroadcastChannel.postMessage({
                        type: 'cert',
                        data: this.metas.cert
                    });
                    this.opsBroadcastChannel.postMessage({
                        type: 'dashscope',
                        data: this.form.meta.apiKey
                    });
                }, 3000)


                this.opsBroadcastChannel.onmessage = (event) => {
                    let data = event.data;
                    if (data.type == 'cert') {
                        if (!this.metas.cert || this.metas.cert == '') {
                            this.metas.cert = data.data;
                        }
                    }
                    if (data.type == 'dashscope') {
                        if (!this.form.meta.apiKey || this.form.meta.apiKey == '') {
                            this.form.meta.apiKey = data.data;
                        }
                    }
                };

            },
            loadData() {
                let content = localStorage.getItem('ops:dashscope:image:kling-text2image:data');
                if (!content) {
                    return
                }
                content = content.trim();
                if (content.length == 0) {
                    return;
                }
                try {
                    let obj = JSON.parse(content);
                    Object.keys(obj).forEach(k => {
                        this.$data[k] = obj[k];
                    });
                } catch (e) {

                }
            },
            storeData() {
                try {
                    let data = {...this.$data};
                    data.opsBroadcastChannel = null;
                    data.langEditors = {};
                    Object.keys(this.$data.langEditors).forEach(k => {
                        data.langEditors[k] = null;
                    })
                    let json = JSON.stringify(data);
                    let obj = JSON.parse(json);
                    obj.metas.cert = '';
                    obj.form.meta.apiKey = '';
                    let content = JSON.stringify(obj);
                    localStorage.setItem('ops:dashscope:image:kling-text2image:data', content);
                } catch (e) {
                    // console.log(e)
                }
            },
            initStoreData() {
                let reset = new URL(window.location.href).searchParams.get('reset');
                if (reset != 'true') {
                    this.loadData();
                }
                setInterval(() => {
                    this.storeData();
                }, 1000);
            },
            doResetData() {
                let newData = this.getDefaultData();
                Object.keys(newData).forEach(k => {
                    this.$data[k] = newData[k];
                })
            },
            getTransfer() {
                let cert = this.metas.cert;
                if (!cert || cert.length == 0) {
                    cert = '';
                }
                cert = cert.trim();
                if (!cert || cert.length == 0) {
                    throw new Error('请先填写连接证书')
                }
                let ex = null;
                for (let i = 0; i < 3; i++) {
                    try {
                        let keyPair = OpsSecureHelper.deserializeKeyPair(cert)
                        return new OpsSecureTransfer(keyPair)
                    } catch (e) {
                        ex = e;
                    }
                }
                if (!ex) {
                    ex = new Error('init transfer error')
                }
                throw ex;
            },
            transferSend(req){
                let ex=null;
                for (let i = 0; i < 5; i++) {
                    try{
                        let transfer = this.getTransfer();
                        return transfer.send(req);
                    }catch (e){
                        ex=e;
                    }
                }
                if(ex!=null){
                    throw ex;
                }
            },
            transferRecv(req){
                let ex=null;
                for (let i = 0; i < 5; i++) {
                    try{
                        let transfer = this.getTransfer();
                        return transfer.recv(req);
                    }catch (e){
                        ex=e;
                    }
                }
                if(ex!=null){
                    throw ex;
                }
            },
            messageError(msg, limit) {
                window._lastError = msg;
                if (limit && limit >= 0) {
                    if (msg && msg.length > limit) {
                        msg = msg.substring(0, limit) + '...'
                    }
                }
                this.$message.error(msg)
            },
            onCertChange() {

            },
            assignDashScopeMeta(req) {
                req.meta = this.form.meta;
                req.modelName = this.form.modelName;
                if(!req.meta.apiKey){
                    throw new Error('请先填写 Api Key')
                }
                return req;
            },
            onExecute() {
                this.$confirm('即将执行转换，是否继续？<br/>', '操作提示', {
                    confirmButtonText: '确定',
                    cancelButtonText: '取消',
                    type: 'warning',
                    dangerouslyUseHTMLString: true
                }).then(() => {
                    this.doExecute();
                }).catch(() => {
                    this.$message({
                        type: 'info',
                        message: '已取消执行'
                    });
                });
            },
            doExecute() {
                this.metas.resultTaskLoading = true;
                try {
                    let contentList=[
                        {
                            "text": this.form.prompt
                        }
                    ]
                    if(this.form.imageUrl){
                        contentList.push({
                            image: this.form.imageUrl
                        })
                    }
                    let payload={
                        input: {
                            messages: [
                                {
                                    role: "user",
                                    content: contentList
                                }
                            ]
                        },
                        parameters: {
                            n: this.form.count,
                            aspect_ratio: this.form.ratio,
                            resolution: this.form.resolution,
                            watermark: this.form.watermark,
                        }
                    }
                    if(this.supportOmni){
                        payload.parameters={
                            ...payload.parameters,
                            series_amount: this.form.count,
                            result_type: this.form.resultType,
                        }
                    }
                    let req = this.assignDashScopeMeta(payload);
                    this.$axios({
                        url: `/text2image/generate`,
                        method: 'post',
                        data: this.transferSend(req)
                    }).then(res => {
                        if (res.data.code == 200) {
                            //console.log(res.data)
                            let resp = this.transferRecv(res.data.data)
                            // console.log(resp)
                            this.metas.resultTaskId = resp;
                            this.onQueryStatus();
                        } else {
                            this.messageError(res.data.msg, 300)
                        }
                    }).catch(err => {
                        this.messageError(err.errorMessage || err.message || '操作失败', 300)
                    }).finally(() => {
                        this.metas.resultTaskLoading = false;
                    })
                } catch (err) {
                    this.messageError(err.errorMessage || err.message || '操作失败', 300)
                    this.metas.resultTaskLoading = false;
                }
            },
            onQueryStatus() {
                this.metas.resultLoading = true;
                try {
                    let req = this.assignDashScopeMeta({
                        taskId: this.metas.resultTaskId
                    });
                    this.$axios({
                        url: `../../task/status`,
                        method: 'post',
                        data: this.transferSend(req)
                    }).then(res => {
                        if (res.data.code == 200) {
                            //console.log(res.data)
                            let resp = this.transferRecv(res.data.data)
                            // console.log(resp)
                            let taskStatus = resp.output.task_status
                            if ('PENDING' == taskStatus
                                || 'RUNNING' == taskStatus) {
                                setTimeout(() => {
                                    this.onQueryStatus()
                                }, 5000)
                            } else if ('SUCCEEDED' == taskStatus) {
                                let resultImages=[]
                                let choices=resp.output.choices || [];
                                for (let i = 0; i < choices.length; i++) {
                                    let choice=choices[i];
                                    let choiceMessage=choice.message || {};
                                    let choiceMessageContents=choiceMessage.content || [];
                                    for(let j=0;j<choiceMessageContents.length;j++){
                                        let content=choiceMessageContents[j];
                                        let image=content.image
                                        if(image){
                                            resultImages.push({
                                                image: image
                                            })
                                        }
                                    }
                                }
                                // console.log(resp)
                                this.metas.resultImages = resultImages;

                                this.metas.resultLoading = false;
                            } else {
                                let code = resp.output.code;
                                let message = resp.output.message;
                                this.messageError(`${code}: ${message}`, 300)
                                this.metas.resultLoading = false;
                            }
                        } else {
                            this.messageError(res.data.msg, 300)
                            this.metas.resultLoading = false;
                        }
                    }).catch(err => {
                        this.messageError(err.errorMessage || err.message || '操作失败', 300)
                        this.metas.resultLoading = false;
                    })
                } catch (err) {
                    this.messageError(err.errorMessage || err.message || '操作失败', 300)
                    this.metas.resultLoading = false;
                }
            },
            md5ForFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader()

                    reader.onload = function (e) {
                        const resultBuffer = reader.result
                        const wordArray = CryptoJS.lib.WordArray.create(resultBuffer)
                        const md5Hash = CryptoJS.MD5(wordArray)

                        resolve(md5Hash.toString())
                    }

                    reader.onerror = function (e) {
                        reject(reader.error)
                    }

                    reader.readAsArrayBuffer(file)
                })
            },
            onUploadImageFileChange(file) {
                this.metas.uploadImageList = []
                this.metas.uploadImageList.push(file)
                this.$confirm('即将上传文件，是否继续？<br/>' + file.name, '操作提示', {
                    confirmButtonText: '确定',
                    cancelButtonText: '取消',
                    type: 'warning',
                    dangerouslyUseHTMLString: true
                }).then(() => {
                    this.doUploadFile(file)
                }).catch(() => {
                    this.$message({
                        type: 'info',
                        message: '已取消执行'
                    });
                });
            },
            doUploadFile(file) {
                this.metas.uploadImageLoading = true;
                try {
                    this.md5ForFile(file.raw)
                        .then(md5 => {
                            let form = new FormData();
                            form.append('file', file.raw, file.name);

                            let req = this.assignDashScopeMeta({
                                md5: md5
                            })
                            let reqData = this.transferSend(req);
                            Object.keys(reqData).forEach(k => {
                                form.append(k, reqData[k])
                            })

                            this.$axios({
                                url: `../../tmp-file/upload`,
                                method: 'post',
                                headers: {
                                    'Content-Type': 'multipart/form-data'
                                },
                                data: form
                            }).then(res => {
                                if (res.data.code == 200) {
                                    //console.log(res.data)
                                    let resp = this.transferRecv(res.data.data)
                                    this.form.imageUrl = resp;
                                    // console.log(resp)
                                    this.$message.success('操作成功')
                                } else {
                                    this.messageError(res.data.msg, 300)
                                }
                            }).catch(err => {
                                this.messageError(err.errorMessage || err.message || '操作失败', 300)
                            }).finally(() => {
                                this.metas.uploadImageLoading = false;
                            })
                        }).catch(err => {
                        this.messageError(err.errorMessage || err.message || '操作失败', 300)
                    }).finally(() => {
                        this.metas.uploadImageLoading = false;
                    })
                } catch (err) {
                    this.messageError(err.errorMessage || err.message || '操作失败', 300)
                    this.metas.uploadImageLoading = false;
                }
            },
        }
    })
    let defaultConfig = {
        baseURL: './',
        timeout: 10 * 60 * 1000,
        responseType: 'json'
    }
