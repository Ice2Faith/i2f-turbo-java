spring:
  profiles:
    active: dev

xproc4j:
  xml-locations: classpath*:procedure/**/*.xml;classpath*:com/**/procedure/*.xml
  watching-directories: classpath*:procedure/;classpath*:com/

ai:
  tools:
    file:
      root-path: ./ai-root
    selenium-web-search:
      enable: false
    playwright-web-search:
      enable: false
    command:
      enable: false
    mcp-gateway:
      enable: true
  rags:
    enable: false
    embedding:
      baseUrl: http://localhost:11434/v1
      apiKey: xxx
      model: qwen3-embedding:0.6b
      dimension: 1024
      enableLoadDocs: false
      docsPath: ./rags
      maxSegmentSizeInChars: 512
      docsEmbedBatchSize: 10
      maxOverlapRate: 0.15
      enableMarkitdownDocReader: false
      enableEasyocrDocReader: false
      enablePandocDocReader: false
